<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shesh Prohor - Room</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,400;1,400&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="threat-1">
  <main class="game game-screen">
    <header class="hud hud-panel" aria-label="Game heads-up display">
      <div class="hud-row hud-row-top">
        <div>
          <div class="hud-title">Shesh Prohor</div>
          <div class="hud-sub" id="hud-room-name">Living Room</div>
        </div>
        <div class="hud-meters">
          <div class="meter-card">
            <span class="meter-label">Threat</span>
            <span class="meter-value" id="hud-threat-value">1</span>
          </div>
          <div class="meter-card">
            <span class="meter-label">Battery</span>
            <span class="meter-value" id="hud-battery-value">40%</span>
          </div>
          <div class="meter-card">
            <span class="meter-label">Timer</span>
            <span class="meter-value" id="hud-timer-value">--</span>
          </div>
        </div>
      </div>

      <div class="hud-row hud-row-bottom">
        <div class="task-panel">
          <div class="task-panel-head">Task Queue</div>
          <ul class="task-list" id="task-list"></ul>
        </div>
        <div class="system-panel">
          <div class="system-line" id="interaction-hint">Move close to an object and press SPACE.</div>
          <div class="system-line" id="phone-status">Phone battery matters during the night.</div>
        </div>
      </div>
    </header>

    <section class="canvas-shell" aria-label="Game area">
      <canvas class="room" id="game-canvas" width="720" height="806" aria-label="Main game area"></canvas>
      <div class="level-overlay" id="level-overlay" aria-live="polite">
        <div class="level-card">
          <div class="level-kicker" id="level-kicker">Level</div>
          <h2 class="level-title" id="level-title">Level One</h2>
          <p class="level-body" id="level-body">Press Enter or Space to begin.</p>
        </div>
      </div>
      <div class="dialogue-box" id="dialogue-box" aria-live="polite">
        <div class="dialogue-kicker" id="dialogue-kicker">Event</div>
        <h2 class="dialogue-title" id="dialogue-title">Dialogue</h2>
        <p class="dialogue-body" id="dialogue-body"></p>
        <ul class="dialogue-choices" id="dialogue-choices"></ul>
      </div>
    </section>
  </main>

  <script src="src/config/playerConfig.js"></script>
  <script src="src/controllers/inputController.js"></script>
  <script src="src/controllers/movementController.js"></script>
  <script src="src/renderers/playerRenderer.js"></script>
  <script src="src/rooms/roomRegistry.js"></script>
  <script src="src/rooms/living-room/room.js"></script>
  <script src="src/rooms/kitchen/room.js"></script>
  <script src="src/rooms/children-room/room.js"></script>
  <script src="src/rooms/basement/room.js"></script>
  <script src="src/audio/audio.js"></script>
  <script src="src/content/content.js"></script>
  <script src="src/core/gameState.js"></script>
  <script src="src/core/game.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
